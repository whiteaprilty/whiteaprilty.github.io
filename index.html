<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เปิดไพ่ธรรมผังตรง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Anuphan', sans-serif;
            background: linear-gradient(135deg, #090d16 0%, #111827 100%);
            min-height: 100vh;
            color: #f1f5f9;
        }
        .deck-circle {
            position: relative;
            width: 340px;
            height: 340px;
            margin: 0 auto;
        }
        .tarot-card-hidden {
            position: absolute;
            width: 42px;
            height: 70px;
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            border: 1.5px solid #d97706;
            border-radius: 4px;
            top: 50%;
            left: 50%;
            transform-origin: center center;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
        }
        .tarot-card-hidden:hover {
            border-color: #fbbf24;
            box-shadow: 0 0 12px #f59e0b;
        }
        @keyframes shuffleAnim {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(calc(-50% + var(--mx)), calc(-50% + var(--my))) rotate(45deg); }
            50% { transform: translate(calc(-50% - var(--mx)), calc(-50% - var(--my))) rotate(-45deg); }
            75% { transform: translate(calc(-50% + var(--mx)), calc(-50% - var(--my))) rotate(15deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }
        .shuffling {
            animation: shuffleAnim 0.5s ease-in-out infinite;
        }
        .card-picked {
            opacity: 0;
            transform: translate(-50%, -180%) scale(0) !important;
            pointer-events: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-slate-900/90 backdrop-blur-lg rounded-3xl p-6 md:p-10 shadow-2xl border border-amber-500/20">
        
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-amber-400 via-purple-400 to-indigo-500 mb-2">
                เปิดไพ่ธรรมผังตรง
            </h1>
            <p class="text-slate-400 text-sm md:text-base tracking-wide">สำนักปฎิบัติธรรมเต็มสิบ  ระบบกำลังทดสอบ  ยังไม่เรียบร้อย</p>
        </header>

        <!-- Control Panel -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-center bg-slate-950/80 p-6 rounded-2xl mb-8 border border-slate-800">
            <!-- กรอกอายุ -->
            <div>
                <label class="block text-sm font-medium text-amber-400 mb-2">ระบุอายุของคุณ (เพื่อประมวลผลตามช่วงอายุสากล)</label>
                <input type="number" id="userAge" min="1" max="100" value="25" 
                       class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-amber-500 transition font-semibold text-lg text-center">
            </div>
            <!-- โหมดการดูดวง -->
            <div class="flex gap-3">
                <button id="btnDaily" onclick="setMode('daily')" class="flex-1 bg-gradient-to-r from-blue-700 to-indigo-700 hover:from-blue-600 hover:to-indigo-600 text-white font-medium py-2.5 px-4 rounded-xl transition shadow-lg disabled:opacity-40 disabled:cursor-not-allowed">
                    รายวัน (1 ใบ)
                </button>
                <button id="btnWeekly" onclick="setMode('weekly')" class="flex-1 bg-gradient-to-r from-purple-700 to-pink-700 hover:from-purple-600 hover:to-pink-600 text-white font-medium py-2.5 px-4 rounded-xl transition shadow-lg disabled:opacity-40 disabled:cursor-not-allowed">
                    รายสัปดาห์ (10 ใบ)
                </button>
            </div>
            <!-- ปุ่มควบคุมการสับ/รีเซ็ต -->
            <div class="flex gap-3 items-center">
                <button id="btnShuffle" onclick="shuffleDeck()" disabled class="flex-1 bg-amber-600 hover:bg-amber-500 text-white font-semibold py-2.5 px-4 rounded-xl transition disabled:opacity-30 disabled:cursor-not-allowed shadow-md">
                    สับไพ่
                </button>
                <button id="btnReset" onclick="resetApp()" class="bg-slate-800 hover:bg-slate-700 text-rose-400 font-medium py-2.5 px-6 rounded-xl transition border border-rose-500/30">
                    Reset
                </button>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="text-center mb-6">
            <span class="bg-slate-950 px-5 py-2 rounded-full text-xs md:text-sm text-slate-300 border border-slate-800 inline-block">
                จำนวนครั้งที่สับไพ่: <strong id="shuffleCount" class="text-amber-400 text-lg mx-1">0</strong> ครั้ง | 
                สถานะ: <span id="statusText" class="text-yellow-400 font-medium">กรุณาเลือกโหมดดวงชะตาก่อน</span>
            </span>
        </div>

        <!-- Tarot Deck Circle Area -->
        <div class="flex justify-center items-center my-10 min-h-[360px]">
            <div id="deckContainer" class="deck-circle">
                <!-- วงกลมไพ่สากลถูกเรนเดอร์ตรงนี้ -->
            </div>
        </div>

        <!-- ผลทำนายดวงชะตา -->
        <div id="predictionResult" class="hidden mt-12 pt-8 border-t border-slate-800">
            <h2 class="text-2xl font-bold text-center text-amber-400 mb-8 tracking-wider">🔮 เปิดบันทึกคำทำนายดวงชะตา</h2>
            
            <!-- ส่วนแสดงผัง Celtic Cross Spread Layout Diagram แบบกระชับ -->
            <div id="celticCrossLayout" class="hidden max-w-lg mx-auto p-4 bg-slate-950/80 rounded-2xl border border-slate-800/80 mb-8 shadow-inner">
                <h3 class="text-sm font-semibold text-center text-purple-300 mb-4 tracking-wide">ผังตำแหน่งไพ่ Celtic Cross</h3>
                <div class="flex justify-center items-center gap-4">
                    <!-- โซนวงล้อหลัก (ตำแหน่ง 1-6) -->
                    <div class="relative w-[200px] h-[200px] flex-shrink-0 bg-slate-900/40 rounded-full border border-slate-800/30">
                        <div id="pos3" class="absolute top-1 left-1/2 -translate-x-1/2"></div>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-14">
                            <div id="pos1" class="absolute inset-0 z-10"></div>
                            <div id="pos2" class="absolute inset-0 z-20 transform rotate-90 scale-95 origin-center"></div>
                        </div>
                        <div id="pos6" class="absolute right-1 top-1/2 -translate-y-1/2"></div>
                        <div id="pos5" class="absolute left-1 top-1/2 -translate-y-1/2"></div>
                        <div id="pos4" class="absolute bottom-1 left-1/2 -translate-x-1/2"></div>
                    </div>
                    
                    <!-- โซนแถวตั้ง (ตำแหน่ง 7-10) -->
                    <div class="flex flex-col-reverse gap-1.5 items-center justify-center border-l border-slate-800/60 pl-4 h-[220px]">
                        <div id="pos7" class="flex flex-col items-center"></div>
                        <div id="pos8" class="flex flex-col items-center"></div>
                        <div id="pos9" class="flex flex-col items-center"></div>
                        <div id="pos10" class="flex flex-col items-center"></div>
                    </div>
                </div>
            </div>

            <div id="predictionList" class="space-y-6">
                <!-- รายการคำทำนายแบบละเอียดจะมาแสดงผลตรงนี้อย่างสะอาดตา -->
            </div>
        </div>
    </div>

    <!-- สคริปต์ความหมายไพ่มาตรฐาน RWS 78 ใบเต็มชุด -->
    <script>
        const fullTarotDeck = [
            // MAJOR ARCANA (0-21)
            { id: 0, eng: "The Fool", tha: "เดอะ ฟูล (ผู้เริ่มต้น/ผู้แสวงหา)", 
              young: "ช่วงเวลานี้คือรุ่งอรุณแห่งชีวิตใหม่ของคุณ! คุณกำลังรู้สึกเต็มไปด้วยอิสรภาพและพลังงานอันบริสุทธิ์ในการเรียนหรือกิจกรรม ความคิดสร้างสรรค์กำลังพรั่งพรูจนทำให้คุณอยากออกไปค้นหาโลกภายนอกอย่างไม่เกรงกลัวต่ออุปสรรคใดๆ อย่างไรก็ดี ไพ่ใบนี้เตือนให้ระวังความสะเพร่าหรือการทำอะไรตามใจตัวเองจนเกินไปโดยไม่ฟังคำเตือนของผู้ใหญ่\n\nด้านความรัก: อาจจะได้พบมิตรภาพใหม่ที่น่าตื่นเต้นแต่ยังไม่มีข้อผูกมัดชัดเจน เป็นความสัมพันธ์ที่เน้นความสนุกสนานมากกว่าความมั่นคง", 
              adult: "ดวงชะตากำลังเปิดรับการเปลี่ยนแปลงครั้งใหญ่! มีเกณฑ์การย้ายงาน เปลี่ยนสายอาชีพ หรือการริเริ่มลงทุนในสิ่งใหม่ๆ ที่ท้าทายความสามารถของคุณอย่างมาก ตัวคุณมีพลังกายพลังใจเต็มเปี่ยมในการก้าวข้ามกรอบชีวิตเดิมๆ ทว่าไพ่ใบนี้นำมาซึ่งความเสี่ยงที่แฝงอยู่ ควรตรวจสอบข้อกฎหมาย สัญญา และเอกสารทางการเงินให้รอบคอบเป็นสองเท่าก่อนก้าวเดิน\n\nด้านความรัก: คนโสดมีโอกาสพบรักระหว่างเดินทางไกลอย่างกะทันหัน ส่วนคนมีคู่ระวังเรื่องอารมณ์ชั่ววูบทำโครงสร้างครอบครัวสั่นคลอน", 
              elder: "ชีวิตในวัยนี้คือช่วงเวลาแห่งการปล่อยวางภาระอันหนักอึ้งในอดีตและหันกลับมาใช้ชีวิตในแบบที่ใจตนเองปรารถนาอย่างแท้จริง คุณมีเกณฑ์เดินทางท่องเที่ยวไปยังสถานที่แปลกใหม่ หรือพบงานอดิเรกแปลกใหม่ที่สร้างความกระชุ่มกระชวยให้กับหัวใจอีกครั้ง สุขภาพกายใจเบิกบานแจ่มใส\n\nข้อควรระวัง: ระวังอุบัติเหตุจากการทำอะไรที่โลดโผนเกินกำลังร่างกาย หรือการใช้จ่ายทรัพย์สินตามใจชอบโดยไม่วางแผนระยะยาว" },
            
            { id: 1, eng: "The Magician", tha: "เดอะ เมจิเชียน (จอมเวทย์/ผู้มีพรสวรรค์)", 
              young: "คุณเป็นผู้ที่มีสติปัญญาเฉียบแหลมและไหวพริบปฏิภาณยอดเยี่ยมอย่างมากในช่วงนี้ ความสามารถในการเรียนรู้สิ่งใหม่ๆ ทำได้รวดเร็วกว่าคนอื่นอย่างเห็นได้ชัด การสอบแข่งขันหรือการนำเสนอยานจะประสบความสำเร็จงดงามเพราะคารมและความสามารถเฉพาะตัวที่โดดเด่น\n\nคำแนะนำ: จงใช้พรสวรรค์ที่มีสร้างสรรค์ผลงาน แต่อย่าใช้มันเพื่อการเอาเปรียบผู้อื่นหรือโกงการทดสอบใดๆ", 
              adult: "นี่คือจังหวะชีวิตที่คุณสามารถผันความรู้ความสามารถมาเป็นทรัพย์สินได้อย่างมหาศาล! มีโอกาสที่จะได้รับโปรเจกต์ใหญ่ งานที่ต้องใช้การแก้ปัญหาเฉพาะหน้าชั้นสูงจะผ่านพ้นไปได้ด้วยดีด้วยไหวพริบของคุณเอง การเจรจาการค้าหรือเริ่มต้นธุรกิจส่วนตัวได้รับการสนับสนุนอย่างยอดเยี่ยม\n\nด้านการเงิน: มีช่องทางสร้างรายได้เสริมที่เกิดจากทักษะพิเศษของคุณเองและจะเติบโตอย่างมั่นคง", 
              elder: "คุณคือศูนย์รวมแห่งปัญญาและประสบการณ์อันทรงคุณค่า เป็นช่วงเวลาที่เหมาะสำหรับการเป็นที่ปรึกษา คอยชี้แนะแนวทาง หรือส่งต่อวิชาความรู้ให้แก่คนรุ่นหลัง จิตใจของคุณยังคงเฉียบคมและเท่าทันความเปลี่ยนแปลงของโลกยุคใหม่อยู่เสมอ\n\nด้านสุขภาพ: แข็งแรงดี มีการฟื้นตัวจากอาการป่วยไข้ได้อย่างน่ามหัศจรรย์ด้วยพลังใจที่คิดบวก" },
            
            { id: 2, eng: "The High Priestess", tha: "เดอะ ไฮ พรีสเทส (ราชินีพระจันทร์/ความลึกลับและสัญชาตญาณ)", 
              young: "ช่วงนี้อารมณ์ของคุณค่อนข้างอ่อนไหวและแปรปรวนง่ายเป็นพิเศษ มีความลับในใจที่ไม่สามารถบอกใครได้เต็มปาก ทว่าคุณกลับมีลางสังหรณ์หรือเซนส์ที่แม่นยำมากในการมองคนและการคาดเดาสถานการณ์ เหมาะแก่การเรียนศาสตร์ลึกลับ จิตวิทยา หรือศิลปะ\n\nด้านความรัก: ระวังความเหงาจะทำให้นำพาตัวเองไปตกอยู่ในความสัมพันธ์ที่ซับซ้อน หรือการแอบรักคนมีเจ้าของ", 
              adult: "การงานในระยะนี้เน้นหนักไปที่งานเบื้องหลัง งานวิเคราะห์ข้อมูลเชิงลึก หรือธุรกิจที่ต้องใช้ความลับและความน่าเชื่อถือสูง คุณควรเชื่อในสัญชาตญาณและการตัดสินใจเงียบๆ ของตนเองมากกว่าเสียงวิจารณ์รอบข้าง ระวังเรื่องการเมืองในออฟฟิศและการถูกแทงข้างหลัง\n\nด้านการเงิน: มีเกณฑ์ได้โชคลาภจากเพศหญิง หรือได้เงินมาแบบไม่เปิดเผย เช่น งานสีเทา หรืองานใต้โต๊ะ ซึ่งต้องบริหารด้วยความรอบคอบ", 
              elder: "ชีวิตก้าวเข้าสู่ความสงบเยือกเย็นและการตกผลึกทางจิตวิญญาณอย่างแท้จริง เป็นช่วงเวลาที่คุณสนใจเรื่องการทำสมาธิ ธรรมะ หรือการปลีกวิเวกออกจากความวุ่นวายทางโลกเพื่อดูแลจิตใจตนเอง\n\nข้อควรระวัง: ระวังอาการนอนไม่หลับ ความวิตกกังวลสะสม และปัญหาสุขภาพเกี่ยวกับระบบฮอร์โมนหรือระบบสืบพันธุ์" },
            
            { id: 3, eng: "The Empress", tha: "ดิ เอ็มเพรส (จักรพรรดินี/ความอุดมสมบูรณ์)", 
              young: "ดวงชะตาของคุณเปี่ยมไปด้วยความสุขสบายและการได้รับการอุปถัมภ์ค้ำชูจากผู้ใหญ่ โดยเฉพาะเพศหญิงในครอบครัว การเรียนมีความราบรื่น ไร้แรงกดดัน มีกินมีใช้สมบูรณ์พูนสุขและมีเสน่ห์ดึงดูดใจต่อผู้พบเห็นอย่างมากในช่วงนี้\n\nด้านความรัก: มีเกณฑ์พบคนที่พร้อมจะเข้ามาดูแลเอาใจใส่คุณราวกับเจ้าหญิงเจ้าชายเลยทีเดียว", 
              adult: "นี่คือช่วงเวลาแห่งความเจริญรุ่งเรืองและการงอกเงยของชีวิต! หากทำธุรกิจส่วนตัว กิจการจะขยายตัวและสร้างผลกำไรอย่างงาม ข้าทาสบริวารให้ความเคารพและซื่อสัตย์ สำหรับผู้ที่วางแผนครอบครัว มีเกณฑ์สูงมากที่จะได้ข่าวดีเรื่องการตั้งครรภ์หรือการซื้ออสังหาริมทรัพย์ใหม่\n\nด้านการเงิน: มั่งคั่ง มั่นคง มีเงินหมุนเวียนเข้ามาจากหลายทิศทางอย่างอบอุ่น", 
              elder: "บั้นปลายชีวิตของคุณเต็มไปด้วยความสง่างามและความพร้อมในทุกๆ ด้าน ลูกหลานบริวารห้อมล้อมคอยดูแลเอาใจใส่เป็นอย่างดี บ้านเรือนร่มเย็นอุดมสมบูรณ์ไปด้วยทรัพย์สินเงินทอง\n\nด้านสุขภาพ: โดยรวมสมบูรณ์แข็งแรงดี แต่อาจต้องควบคุมเรื่องอาหารการกินและน้ำหนักตัวที่อาจเพิ่มขึ้นง่ายเกินไป" },
            
            { id: 4, eng: "The Emperor", tha: "ดิ เอ็มเพอเรอร์ (จักรพรรดิ/ผู้ครองอำนาจ)",

            { id: 6, eng: "The Lovers", tha: "เดอะ เลิฟเวอร์ส (คู่รัก/การตัดสินใจทางแพร่ง)",

              adult: "มีเกณฑ์ต้องทำการตัดสินใจทางแพร่งครั้งใหญ่ในชีวิตการงาน เช่น การเลือกระหว่างงานสองบริษัท หรือการตัดสินใจเลือกหุ้นส่วนธุรกิจที่เข้ามาเสนอตัว การเจรจาค้าขายและการตลาดมีความโดดเด่นมากเพราะเสน่ห์ในตัวคุณ\n\nด้านความรัก: คนโสดยังคงมีตัวเลือกเข้ามาให้หวั่นไหว ส่วนคนมีคู่เป็นช่วงเวลาที่ต้องหันหน้ามาตกลงเรื่องอนาคตร่วมกัน",

        // สร้างข้อมูลไพ่ที่เหลือ (8-77) ให้ครบ 78 ใบโดยอัตโนมัติ พร้อมคำอธิบายที่ละเอียด

        let idIdx = 8;
        const remainingMajors = [

        remainingMajors.forEach(m => {
            fullTarotDeck.push({
                id: idIdx++,

                tha: m.tha,
                young: `สถานการณ์ดวงชะตาชีวิตและการเรียนของท่านในช่วงเวลานี้ ตกอยู่ในเกณฑ์ที่ต้องใช้สติและความละเอียดรอบคอมอย่างสูงสุด มีเกณฑ์พบเจอจุดเปลี่ยนผันในสถาบันการศึกษาหรือมิตรภาพรอบข้าง\n\nแง่คิดและแนวทาง: ขอให้ใช้ปัญญา ความนุ่มนวล และความเพียรพยายามในการเอาชนะแรงกดดันของเพื่อนฝูงและการเรียน แล้วผลลัพธ์จะออกมาดีเกินคาดหมาย`,
                adult: `บริบทการดำเนินชีวิต การงาน และสภาวะทางสังคมในปัจจุบันของท่าน กำลังเดินหน้าเข้าสู่ช่วงของการทดสอบครั้งสำคัญ มีความรับผิดชอบที่เข้มข้นขึ้น มีอุปสรรคและโอกาสผ่านเข้ามาพร้อมๆ กัน\n\nแง่คิดและแนวทาง: การทำธุรกิจการค้าในระยะนี้ต้องอาศัยวิสัยทัศน์ที่กว้างไกลและการวางแผนอย่างเป็นระบบ ระวังเรื่องการขัดผลประโยชน์และการเซ็นสัญญาเอกสารสำคัญต่างๆ ควรมุ่งมั่นในความถูกต้องเสมอ`,

            const courts = ['Page', 'Knight', 'Queen', 'King'];

                    id: idIdx++,
                    eng: `${court} of ${suite}`,
                    tha: `${courtThas[cIdx]}${suiteThas[sIdx].split(' ')[0]}`,
                    young: `คุณมีเกณฑ์จะได้พบเจอหรือได้รับอิทธิพลอย่างสูงจากบุคคลที่มีลักษณะเด่นตามหน้าไพ่ใบนี้ ซึ่งจะมีบทบาทสำคัญต่อชีวิตการเรียนของคุณในระยะนี้\n\nรายละเอียดคำพยากรณ์ลึกซึ้ง: ตัวคุณเองอาจต้องดึงคุณลักษณะของไพ่ใบนี้ออกมาใช้ เช่น ความกระตือรือร้นในการค้นคว้า หรือการใช้เหตุผลในการแก้ปัญหาความขัดแย้งกับกลุ่มเพื่อนเพื่อผ่านสถานการณ์นี้ไปได้`,
                    adult: `การดำเนินงานและธุรกิจของท่านในรอบสัปดาห์นี้ จะเกี่ยวพันกับบุคคลที่มีลักษณะตามอำนาจของไพ่ใบนี้อย่างหลีกเลี่ยงไม่ได้ ซึ่งอาจมาในรูปแบบของเจ้านาย หุ้นส่วน หรือคู่แข่งทางการค้า\n\nรายละเอียดคำพยากรณ์ลึกซึ้ง: จงใช้ความสุขุม คอนเนคชั่น และชั้นเชิงที่เหนือกว่าในการติดต่อเจรจา อย่าด่วนสรุปผลลัพธ์จากคำพูดที่สวยหรูเพียงอย่างเดียว และจงรักษาผลประโยชน์ขององค์กรตนเองอย่างเต็มความสามารถ`,
                    elder: `เกณฑ์บริวารและผู้คนรอบตัวของท่านในช่วงเวลานี้ จะนำพาสถานการณ์หรือข่าวสารสำคัญบางประการมาให้ท่านได้รับทราบ\n\nรายละเอียดคำพยากรณ์ลึกซึ้ง: อาจเป็นบุตรหลานหรือญาติมิตรที่มีลักษณะตรงตามหน้าไพ่เข้ามาขอคำปรึกษาหรือนำโชคลาภมาให้ ขอให้ท่านวางตัวเป็นผู้ใหญ่ที่เปี่ยมด้วยความเมตตาและมอบแนวคิดที่รอบคอบให้แก่พวกเขา ซึ่งจะช่วยเสริมบารมีของท่านให้สูงยิ่งขึ้น`
                });
            });
        });

        // รายชื่อตำแหน่งแบบสั้นกระชับ
        const celticCrossPositions = [
            "ใบที่ 1: ตัวตนปัจจุบัน",
            "ใบที่ 2: อุปสรรค/สิ่งแทรกแซง",
            "ใบที่ 3: ความคิด/เป้าหมายในใจ",
            "ใบที่ 4: รากฐานอดีต",
            "ใบที่ 5: อดีตที่เพิ่งผ่านมา",
            "ใบที่ 6: อนาคตอันใกล้",
            "ใบที่ 7: แนวทางแก้ไข/ใจตนเอง",
            "ใบที่ 8: สิ่งแวดล้อม/คนรอบข้าง",
            "ใบที่ 9: ความหวัง/ความกลัว",
            "ใบที่ 10: บทสรุปดวงชะตา"
        ];

        let currentDeck = [...fullTarotDeck];
        let selectedMode = null;
        let maxCardsToPick = 0;
        let shuffleCount = 0;
        let isShuffled = false;
        let pickedCards = [];

        function setMode(mode) {
            selectedMode = mode;
            maxCardsToPick = mode === 'daily' ? 1 : 10;
            
            document.getElementById('btnDaily').disabled = true;
            document.getElementById('btnWeekly').disabled = true;
            document.getElementById('btnShuffle').disabled = false;
            
            if(mode === 'daily') document.getElementById('btnDaily').classList.add('ring-4', 'ring-blue-400');
            else document.getElementById('btnWeekly').classList.add('ring-4', 'ring-pink-400');

            document.getElementById('statusText').innerText = `เลือกโหมดสำเร็จ! กรุณากดปุ่ม "สับไพ่" เพื่อเปิดสำรับ`;
            renderDeckCircle();
        }

        function renderDeckCircle() {
            const container = document.getElementById('deckContainer');
            container.innerHTML = '';
            const total = currentDeck.length;
            const radius = 135;

            currentDeck.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'tarot-card-hidden';
                cardEl.id = `visual-card-${card.id}`;
                
                const angle = (index / total) * 2 * Math.PI;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                const rotateDegree = (angle * 180 / Math.PI) + 90;

                cardEl.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotate(${rotateDegree}deg)`;
                cardEl.style.setProperty('--mx', `${(Math.random() - 0.5) * 100}px`);
                cardEl.style.setProperty('--my', `${(Math.random() - 0.5) * 100}px`);

                cardEl.onclick = () => pickCard(card.id);
                container.appendChild(cardEl);
            });
        }

        function shuffleDeck() {
            const visualCards = document.querySelectorAll('.tarot-card-hidden');
            visualCards.forEach(card => card.classList.add('shuffling'));
            document.getElementById('btnShuffle').disabled = true;

            setTimeout(() => {
                for (let i = currentDeck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]];
                }

                shuffleCount++;
                isShuffled = true;
                
                document.getElementById('shuffleCount').innerText = shuffleCount;
                document.getElementById('statusText').innerText = `สับไพ่เรียบร้อย! คลิกเลือกไพ่จากวงกลมได้เลย (เหลืออีก ${maxCardsToPick - pickedCards.length} ใบ)`;
                document.getElementById('btnShuffle').disabled = false;

                renderDeckCircle();
            }, 500);
        }

        function getCardImage(id) {
            let url = `https://raw.githubusercontent.com/ekelen/tarot-api/master/static/cards/`;
            if(id <= 21) {
                url += `m${id}.jpg`;
            } else if(id <= 35) {
                url += `w0${id - 21}.jpg`;
            } else if(id <= 49) {
                url += `c0${id - 35}.jpg`;
            } else if(id <= 63) {
                url += `s0${id - 49}.jpg`;
            } else {
                url += `p0${id - 63}.jpg`;
            }
            return url;
        }

        function pickCard(cardId) {
            if (!isShuffled) {
                alert("กรุณากดปุ่มสับไพ่ก่อนหยิบไพ่ครับ!");
                return;
            }
            if (pickedCards.length >= maxCardsToPick) return;

            const index = currentDeck.findIndex(c => c.id === cardId);
            if (index === -1) return;
            
            const picked = currentDeck[index];
            pickedCards.push(picked);

            const visualCard = document.getElementById(`visual-card-${cardId}`);
            if (visualCard) visualCard.classList.add('card-picked');

            currentDeck.splice(index, 1);

            const remaining = maxCardsToPick - pickedCards.length;
            if (remaining > 0) {
                document.getElementById('statusText').innerText = `หยิบแล้ว! เลือกไพ่ใบต่อไปอีก ${remaining} ใบ`;
                renderDeckCircle();
            } else {
                // ปิด/ล็อกปุ่มสับไพ่เมื่อหยิบครบกำหนดทันที
                document.getElementById('btnShuffle').disabled = true;
                document.getElementById('statusText').innerText = `หยิบไพ่ครบถ้วนแล้ว! เปิดคำพยากรณ์ด้านล่าง`;
                showPredictions();
            }
        }

        function showPredictions() {
            const age = parseInt(document.getElementById('userAge').value) || 25;
            const listContainer = document.getElementById('predictionList');
            listContainer.innerHTML = '';

            // เรนเดอร์ผัง Celtic Cross Spread Layout แบบจิ๋วกระชับ (เฉพาะเมื่อเลือกโหมดรายสัปดาห์ 10 ใบ)
            if (selectedMode === 'weekly') {
                document.getElementById('celticCrossLayout').classList.remove('hidden');
                for (let i = 1; i <= 10; i++) {
                    const posDiv = document.getElementById(`pos${i}`);
                    if (posDiv) {
                        const card = pickedCards[i - 1];
                        const imgUrl = getCardImage(card.id);
                        posDiv.innerHTML = `
                            <div class="relative group flex flex-col items-center">
                                <img src="${imgUrl}" class="w-8 h-12 object-cover rounded shadow-md border border-amber-500/30 hover:border-amber-400 transition" onerror="this.src='https://placehold.co/32x48/1e1b4b/ffffff?text=T'">
                                <span class="text-[9px] text-slate-400 font-bold bg-slate-900/80 px-1 rounded-sm -mt-2 z-30 shadow border border-slate-700/50">${i}</span>
                            </div>
                        `;
                    }
                }
            } else {
                document.getElementById('celticCrossLayout').classList.add('hidden');
            }

            // แสดงรายการคำทำนายแบบเจาะลึก โดยไม่มีคำว่า "คำนวณดวงชะตาสำหรับ:"
            pickedCards.forEach((card, index) => {
                let appropriateDesc = (age <= 22) ? card.young : (age <= 55) ? card.adult : card.elder;

                const positionLabel = selectedMode === 'daily' 
                    ? "ไพ่พยากรณ์รายวัน: แนวโน้มและอิทธิพลโดยรวมประจำวันนี้" 
                    : celticCrossPositions[index];

                const imageUrl = getCardImage(card.id);

                const cardHtml = `
                    <div class="bg-slate-950/70 p-6 rounded-2xl border border-slate-800 flex flex-col md:flex-row gap-6 items-center md:items-start hover:border-amber-500/20 transition duration-300">
                        <div class="w-28 h-48 bg-slate-900 rounded-xl overflow-hidden flex-shrink-0 shadow-xl border border-slate-700/60">
                            <img src="${imageUrl}" alt="${card.eng}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/120x200/1e1b4b/ffffff?text=Tarot'">
                        </div>
                        
                        <div class="flex-1 w-full text-center md:text-left">
                            <div class="inline-block bg-amber-500/10 text-amber-400 font-semibold text-xs md:text-sm px-4 py-1.5 rounded-full mb-3 border border-amber-500/20">
                                ${positionLabel}
                            </div>
                            
                            <h3 class="text-xl md:text-2xl font-bold text-white mb-4">
                                ${card.eng} <span class="text-amber-500 text-lg md:text-xl font-medium">(${card.tha})</span>
                            </h3>
                            
                            <div class="text-slate-300 text-base md:text-lg leading-relaxed whitespace-pre-line bg-slate-900/60 p-5 rounded-xl border border-slate-800/80 tracking-wide text-left">
                                ${appropriateDesc}
                            </div>
                        </div>
                    </div>
                    ${index < pickedCards.length - 1 ? '<hr class="border-slate-800/60 my-6">' : ''}
                `;
                listContainer.insertAdjacentHTML('beforeend', cardHtml);
            });

            document.getElementById('predictionResult').classList.remove('hidden');
            document.getElementById('predictionResult').scrollIntoView({ behavior: 'smooth' });
        }

        function resetApp() {
            currentDeck = [...fullTarotDeck];
            selectedMode = null;
            maxCardsToPick = 0;
            shuffleCount = 0;
            isShuffled = false;
            pickedCards = [];

            document.getElementById('btnDaily').disabled = false;
            document.getElementById('btnWeekly').disabled = false;
            document.getElementById('btnDaily').className = "flex-1 bg-gradient-to-r from-blue-700 to-indigo-700 hover:from-blue-600 hover:to-indigo-600 text-white font-medium py-2.5 px-4 rounded-xl transition shadow-lg";
            document.getElementById('btnWeekly').className = "flex-1 bg-gradient-to-r from-purple-700 to-pink-700 hover:from-purple-600 hover:to-pink-600 text-white font-medium py-2.5 px-4 rounded-xl transition shadow-lg";
            
            document.getElementById('btnShuffle').disabled = true;
            document.getElementById('shuffleCount').innerText = "0";
            document.getElementById('statusText').innerText = 'กรุณาเลือกโหมดดวงชะตาก่อน';
            
            document.getElementById('deckContainer').innerHTML = '';
            document.getElementById('predictionResult').classList.add('hidden');
            document.getElementById('celticCrossLayout').classList.add('hidden');
            document.getElementById('predictionList').innerHTML = '';
            
            for (let i = 1; i <= 10; i++) {
                const posDiv = document.getElementById(`pos${i}`);
                if (posDiv) posDiv.innerHTML = '';
            }
        }
    </script>
</body>
</html>
